apiVersion: v2
name: boilerplate-nestjs-api
description: Production-grade NestJS 11 REST API boilerplate
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - nestjs
  - rest-api
  - typescript
home: https://github.com/Kojo-Brown/boilerplate-nestjs-api
maintainers:
  - name: Kojo-Brown
    url: https://github.com/Kojo-Brown
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
